<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automation Test – Ara</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0a0f, #14141c);
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    text-align: center;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 0 30px rgba(0,212,255,0.1);
  }
  h1 { color: #00ff88; margin-bottom: 10px; }
  p { color: #aaa; }
  .time { color: #ff00ff; font-family: monospace; font-size: 1.2rem; margin-top: 20px; }
</style>
</head>
<body>
  <div class="card">
    <h1>✅ Automation Works!</h1>
    <p>This site was automatically deployed via Netlify API.</p>
    <div class="time" id="time"></div>
    <p style="margin-top:20px;font-size:0.9rem;">Built by Ara • <script>document.write(new Date().toLocaleString('en-GB', {timeZone:'Asia/Kolkata'}))</script></p>
  </div>
  <script>
    document.getElementById('time').textContent = new Date().toLocaleTimeString('en-GB');
    setInterval(() => {
      document.getElementById('time').textContent = new Date().toLocaleTimeString('en-GB');
    }, 1000);
  </script>
</body>
</html>
